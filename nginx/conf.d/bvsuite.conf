# VIP Suite - configuração do site
# Substitua ${DOMAIN} pelo seu domínio (configurado pelo script de deploy)
# ou edite manualmente após copiar para o VPS.

upstream bvsuite_app {
    server app:3098;
    keepalive 32;
}

# ─── HTTP → redireciona para HTTPS (exceto challenge do Let's Encrypt) ───────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (ativa depois que o certificado SSL existir) ──────────────────────
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name _;

    # SSL — paths padrão do certbot. Substitua pelo seu domínio após emissão.
    ssl_certificate     /etc/letsencrypt/live/bvsuite/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bvsuite/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    access_log /var/log/nginx/bvsuite-access.log main;
    error_log  /var/log/nginx/bvsuite-error.log warn;

    limit_req zone=general burst=20 nodelay;

    # Static assets (cache 30 dias)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        proxy_pass http://bvsuite_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API + tRPC
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://bvsuite_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Health check
    location = /health {
        proxy_pass http://bvsuite_app;
        proxy_http_version 1.1;
        access_log off;
    }

    # SPA fallback (client React)
    location / {
        proxy_pass http://bvsuite_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bloquear arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}